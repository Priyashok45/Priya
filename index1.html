<!DOCTYPE html>
<html>
<head>
  <title>Resume</title>

  <style>

    body{
      font-family: Arial;
      background:#f2f2f2;
    }

    .resume{
      width:600px;
      background:white;
      margin:auto;
      padding:20px;
      border-radius:10px;
    }

    h1{
      color:#1f3c88;
    }

    h2{
      color:#444;
      border-bottom:1px solid gray;
    }

  </style>
</head>

<body>

  <div class="resume">

    <h1>Your Name</h1>
    <p>CSE (AI & ML) Student</p>

    <h2>Contact</h2>
    <p>Email: yourmail@gmail.com</p>
    <p>Phone: 9876543210</p>

    <h2>Skills</h2>
    <ul>
      <li>Python</li>
      <li>HTML</li>
      <li>Java</li>
    </ul>

    <h2>Education</h2>
    <p>B.Tech - CSE (AI & ML)</p>
    <p>CGPA: 8.36</p>

  </div>

</body>
</html>
